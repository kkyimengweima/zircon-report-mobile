<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#ebe4d7">
  <meta name="format-detection" content="telephone=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="锆石研究报告">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>锆石研究报告</title>
  <style>

:root {
  --bg: #f6f4ef;
  --paper: #fffdf8;
  --ink: #202124;
  --muted: #62666d;
  --line: #ded8cc;
  --accent: #8c5a2b;
  --accent-2: #0f766e;
  --soft: #efe8dc;
  --table: #faf7f0;
}
* { box-sizing: border-box; }
html { scroll-behavior: smooth; scroll-padding-top: 88px; }
body {
  margin: 0;
  color: var(--ink);
  background: var(--bg);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  line-height: 1.75;
}
.page { display: grid; grid-template-columns: 280px minmax(0, 1fr); min-height: 100vh; }
.sidebar {
  position: sticky; top: 0; height: 100vh; overflow: auto;
  padding: 28px 22px; border-right: 1px solid var(--line);
  background: #ebe4d7;
}
.sidebar h2 { margin: 0 0 16px; font-size: 18px; color: #3c2b1f; }
.sidebar a { display: block; color: #4b5563; text-decoration: none; border-radius: 6px; padding: 5px 8px; line-height: 1.45; }
.sidebar a:hover { background: rgba(140, 90, 43, .12); color: var(--accent); }
.toc-panel { margin: 0; }
.toc-panel summary { display: none; }
.toc-links { display: block; }
.toc-l2 { margin-top: 4px; font-size: 14px; font-weight: 600; }
.toc-l3 { margin-left: 14px; font-size: 13px; }
.document { max-width: 980px; margin: 0 auto; padding: 56px 42px 88px; background: var(--paper); box-shadow: 0 0 0 1px rgba(222,216,204,.55); }
h1 { font-size: clamp(30px, 5vw, 48px); line-height: 1.18; margin: 0 0 28px; color: #281b14; letter-spacing: 0; }
h2 { margin-top: 52px; padding-top: 16px; border-top: 2px solid var(--soft); font-size: 28px; line-height: 1.28; color: #33251b; letter-spacing: 0; }
h3 { margin-top: 34px; font-size: 21px; color: var(--accent); letter-spacing: 0; }
h4 { margin-top: 26px; font-size: 18px; color: var(--accent-2); letter-spacing: 0; }
p { margin: 14px 0; }
blockquote { margin: 22px 0; padding: 16px 20px; border-left: 4px solid var(--accent-2); background: #eef7f5; color: #26423f; }
blockquote p { margin: 6px 0; }
ol, ul { padding-left: 1.45em; }
li { margin: 8px 0; padding-left: 2px; }
.table-wrap { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; margin: 20px 0 28px; border: 1px solid var(--line); border-radius: 8px; background: #fff; }
table { width: 100%; border-collapse: collapse; min-width: 620px; font-size: 14px; line-height: 1.55; }
th, td { border-bottom: 1px solid var(--line); border-right: 1px solid var(--line); padding: 10px 12px; vertical-align: top; }
th:last-child, td:last-child { border-right: 0; }
tr:last-child td { border-bottom: 0; }
th { background: var(--table); text-align: left; color: #37271d; font-weight: 700; white-space: nowrap; }
pre { overflow-x: auto; padding: 16px 18px; border-radius: 8px; background: #1f2933; color: #f4f7fb; line-height: 1.65; }
code { font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; font-size: .94em; }
a { color: var(--accent-2); }
@media (max-width: 980px) {
  .page { display: block; }
  .sidebar {
    position: sticky;
    top: 0;
    z-index: 20;
    height: auto;
    max-height: 72vh;
    padding: calc(10px + env(safe-area-inset-top)) 14px 10px;
    border-right: 0;
    border-bottom: 1px solid var(--line);
    box-shadow: 0 8px 24px rgba(60, 43, 31, .12);
  }
  .sidebar h2 { display: none; }
  .toc-panel summary {
    display: flex;
    align-items: center;
    justify-content: space-between;
    min-height: 46px;
    padding: 0 12px;
    border: 1px solid rgba(140, 90, 43, .2);
    border-radius: 8px;
    background: #fffdf8;
    color: #3c2b1f;
    font-size: 16px;
    font-weight: 700;
    list-style: none;
    cursor: pointer;
  }
  .toc-panel summary::-webkit-details-marker { display: none; }
  .toc-panel summary::after {
    content: "展开";
    color: var(--accent-2);
    font-size: 13px;
    font-weight: 700;
  }
  .toc-panel[open] summary::after { content: "收起"; }
  .toc-links {
    max-height: calc(72vh - 66px - env(safe-area-inset-top));
    overflow: auto;
    -webkit-overflow-scrolling: touch;
    padding: 10px 4px 4px;
  }
  .toc-l2 { font-size: 15px; padding: 8px 10px; }
  .toc-l3 { margin-left: 10px; font-size: 14px; padding: 7px 10px; }
  .document { padding: 36px 20px 72px; box-shadow: none; }
  h2 { font-size: 24px; }
  table { min-width: 560px; }
}
@media (max-width: 520px) {
  body { line-height: 1.72; }
  .document {
    padding: 24px max(16px, env(safe-area-inset-left)) calc(64px + env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-right));
  }
  h1 { font-size: 30px; line-height: 1.22; margin-bottom: 22px; }
  h2 { margin-top: 42px; padding-top: 14px; font-size: 23px; }
  h3 { margin-top: 28px; font-size: 19px; }
  h4 { font-size: 17px; }
  p, li { font-size: 16px; }
  blockquote { margin: 18px 0; padding: 14px 15px; }
  .table-wrap::before {
    content: "表格可左右滑动";
    display: block;
    padding: 8px 10px;
    border-bottom: 1px solid var(--line);
    color: var(--muted);
    font-size: 12px;
    background: #fffaf1;
  }
  table { min-width: 640px; font-size: 13px; }
  th, td { padding: 9px 10px; }
  pre { font-size: 13px; border-radius: 8px; }
}
@media print {
  body { background: #fff; }
  .page { display: block; }
  .sidebar { display: none; }
  .document { max-width: none; padding: 0; box-shadow: none; }
  h2 { break-after: avoid; }
  .table-wrap { break-inside: avoid; }
}

.lock-screen {
  min-height: 100vh;
  display: grid;
  place-items: center;
  padding: max(24px, env(safe-area-inset-top)) 18px max(24px, env(safe-area-inset-bottom));
  background: var(--bg);
}
.lock-card {
  width: min(440px, 100%);
  padding: 26px 22px;
  border: 1px solid var(--line);
  border-radius: 10px;
  background: var(--paper);
  box-shadow: 0 16px 44px rgba(60, 43, 31, .16);
}
.lock-card h1 { margin: 0 0 10px; font-size: 28px; }
.lock-card p { color: var(--muted); margin: 8px 0 18px; }
.lock-card label { display: block; margin-bottom: 8px; font-weight: 700; color: #3c2b1f; }
.lock-card input {
  width: 100%; min-height: 48px; padding: 10px 12px;
  border: 1px solid var(--line); border-radius: 8px;
  font-size: 18px; background: #fff;
}
.lock-card button {
  width: 100%; min-height: 48px; margin-top: 12px;
  border: 0; border-radius: 8px;
  background: var(--accent-2); color: #fff;
  font-size: 16px; font-weight: 700;
}
.lock-error { min-height: 22px; color: #b42318; font-size: 14px; }
</style>
</head>

        <button type="submit">打开报告</button>

      </form>
    </section>
  </div>

  <script>
    (function () {
      var form = document.getElementById('unlockForm');
      var input = document.getElementById('password');
      var error = document.getElementById('error');
      var payload = JSON.parse(document.getElementById('payload').textContent);
      function b64ToBytes(value) {
        var binary = atob(value);
        var bytes = new Uint8Array(binary.length);
        for (var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
        return bytes;
      }
      async function unlock(password) {
        var enc = new TextEncoder();
        var baseKey = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
        var key = await crypto.subtle.deriveKey(
          { name: 'PBKDF2', salt: b64ToBytes(payload.salt), iterations: payload.iterations, hash: 'SHA-256' },
          baseKey,
          { name: 'AES-GCM', length: 256 },
          false,
          ['decrypt']
        );
        var data = b64ToBytes(payload.data);
        var tag = b64ToBytes(payload.tag);
        var combined = new Uint8Array(data.length + tag.length);
        combined.set(data);
        combined.set(tag, data.length);
        var plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: b64ToBytes(payload.iv), tagLength: 128 }, key, combined);
        return new TextDecoder().decode(plain);
      }
      function activateToc() {
        var panel = document.querySelector('.toc-panel');
        if (!panel || !window.matchMedia) return;
        var query = window.matchMedia('(max-width: 980px)');
        var syncPanel = function () {
          if (query.matches) panel.removeAttribute('open');
          else panel.setAttribute('open', '');
        };
        syncPanel();
        if (query.addEventListener) query.addEventListener('change', syncPanel);
        else if (query.addListener) query.addListener(syncPanel);
        document.querySelectorAll('.toc-links a').forEach(function (link) {
          link.addEventListener('click', function () {
            if (query.matches) panel.removeAttribute('open');
          });
        });
      }
      form.addEventListener('submit', async function (event) {
        event.preventDefault();
        error.textContent = '正在解锁...';
        try {
          var content = await unlock(input.value.trim());
          document.getElementById('app').innerHTML = content;
          document.getElementById('locked').remove();
          activateToc();
        } catch (e) {
          error.textContent = '密码不正确，请再试一次。';
        }
      });
    }());
  </script>
